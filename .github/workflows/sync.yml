name: Upstream Sync (Protected Workflows)

on:
  schedule:
    - cron: '0 3 * * *' # 每天北京时间 11:00 运行
  workflow_dispatch:    # 允许手动触发

jobs:
  sync_latest_from_upstream:
    runs-on: ubuntu-latest
    # 简化权限设置，只保留最基础的内容写入权限
    permissions:
      contents: write

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          # 显式使用内置的 TOKEN
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync upstream changes
        run: |
          # 1. 添加上游并获取
          git remote add upstream https://github.com/zeroclaw-labs/zeroclaw.git
          git fetch upstream master

          # 2. 尝试合并，如果失败也继续执行
          # 我们使用 -X ours 策略，但这通常对删除冲突效果有限，所以后面配合强制清理
          git merge upstream/master --no-commit --allow-unrelated-histories || echo "Handling conflicts..."

          # 3. 【核心修复】解决删除/修改冲突
          # 这一步会将所有处于“未合并”状态的官方工作流文件彻底移除
          git rm .github/workflows/*.yml --cached || echo "No remote workflows to remove"
          
          # 4. 【核心保护】恢复你自己的工作流文件
          # 确保仓库里只剩下你手动清理后保留的那两个文件
          git checkout HEAD -- .github/workflows

          # 5. 提交合并
          # 使用 -a 自动暂存所有变更（包括冲突解决后的删除操作）
          git commit -a -m "chore: sync source code and resolve workflow conflicts" || echo "No changes to sync."

          # 6. 推送
          git push origin master

      - name: Check for Failure
        if: failure()
        run: |
          echo "同步失败！请检查是否存在代码冲突。"
          exit 1
