name: Upstream Sync (Protected Workflows)

on:
  schedule:
    - cron: '0 3 * * *' # 每天北京时间 11:00 运行
  workflow_dispatch:    # 允许手动触发

jobs:
  sync_latest_from_upstream:
    runs-on: ubuntu-latest
    # 简化权限设置，只保留最基础的内容写入权限
    permissions:
      contents: write

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          # 显式使用内置的 TOKEN
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync upstream changes
        run: |
          # 1. 添加上游仓库并获取数据
          git remote add upstream https://github.com/zeroclaw-labs/zeroclaw.git
          git fetch upstream master

          # 2. 尝试合并上游 master，但不立即提交
          # --no-commit 允许我们在 commit 前拦截并恢复 .github 文件夹
          git merge upstream/master --no-commit --allow-unrelated-histories || echo "Detected conflicts, but will attempt to protect local files..."

          # 3. 【核心保护逻辑】强制恢复本地工作流目录
          # 这行命令会将 .github/workflows 文件夹恢复到合并前的状态（即只剩你那两个 yml）
          # 因为没有修改工作流文件，所以 push 时不需要 workflows: write 权限
          git checkout HEAD -- .github/workflows

          # 4. 提交并推送
          # 如果没有任何代码更新，commit 会返回非零，所以加 || true 保证流程继续
          git commit -m "chore: sync source code and keep local workflows" || echo "No changes to sync."
          git push origin master

      - name: Check for Failure
        if: failure()
        run: |
          echo "同步失败！请检查是否存在代码冲突。"
          exit 1
