name: Build ZeroClaw for OneCloud (ARMv7)

on:
  workflow_dispatch: # 支持手动触发编译
  push:
    tags:
      - 'v*' # 当你推送版本标签（如 v1.0.0）时触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-unknown-linux-gnueabihf

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross.git

      - name: Build with cross
        run: |
          # 针对 ARMv7 架构进行 Release 模式编译
          cross build --target armv7-unknown-linux-gnueabihf --release

      - name: Package binary
        run: |
          cd target/armv7-unknown-linux-gnueabihf/release
          tar -czvf zeroclaw-armv7-unknown-linux-gnueabihf.tar.gz zeroclaw
          mv zeroclaw-armv7-unknown-linux-gnueabihf.tar.gz ../../../

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-armv7-binary
          path: zeroclaw-armv7-unknown-linux-gnueabihf.tar.gz

      - name: Create Release (Optional)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: zeroclaw-armv7-unknown-linux-gnueabihf.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
