name: ZeroClaw ARMv7 (Stable & Nightly Dual-Track)

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  # --- 轨道 1：编译官方正式稳定版 ---
  build_stable:
    name: Build Official Stable
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get Upstream Latest Tag
        id: upstream
        run: |
          # 获取官方标记为 Latest 的 Tag 名 (例如 v0.5.6)
          TAG=$(curl -s https://api.github.com/repos/zeroclaw-labs/zeroclaw/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "Official Stable Tag: $TAG"

      - name: Checkout Stable Tag
        uses: actions/checkout@v4
        with:
          repository: zeroclaw-labs/zeroclaw
          ref: ${{ steps.upstream.outputs.TAG }}
          fetch-depth: 1

      - name: Check if already released
        id: check_rel
        run: |
          # 检查你的仓库是否已经有了这个正式版的 Release
          HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.upstream.outputs.TAG }})
          if [ "$HTTP_CODE" == "200" ]; then
            echo "EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and Release Stable
        if: steps.check_rel.outputs.EXISTS == 'false'
        run: |
          # 1. 极简体积优化
          sed -i '/\[profile.release\]/,$d' Cargo.toml
          echo '[profile.release]' >> Cargo.toml
          echo 'opt-level = "z"' >> Cargo.toml
          echo 'lto = true' >> Cargo.toml
          echo 'codegen-units = 1' >> Cargo.toml
          echo 'strip = true' >> Cargo.toml
          echo 'panic = "abort"' >> Cargo.toml

          # 2. 安装环境与编译 (合并执行以节省空间)
          rustup target add armv7-unknown-linux-gnueabihf
          cargo install cross --git https://github.com/cross-rs/cross.git
          cross build --target armv7-unknown-linux-gnueabihf --release

          # 3. 打包
          cd target/armv7-unknown-linux-gnueabihf/release
          FILENAME="zeroclaw-${{ steps.upstream.outputs.TAG }}-armv7-stable.tar.gz"
          tar -czvf $FILENAME zeroclaw
          mv $FILENAME ../../../
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Create Stable Release
        if: steps.check_rel.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.upstream.outputs.TAG }}
          name: "正式稳定版 ${{ steps.upstream.outputs.TAG }}"
          prerelease: false
          make_latest: true
          files: ${{ env.FILENAME }}
          body: |
            ### 🚀 ZeroClaw ARMv7 自动构建 (体积优化版)
            本版本由 GitHub Actions 每日自动构建，同步官方最新源码。
            **优化特性：**
            - **体积压缩**：开启 `opt-level: z` 和 `strip`，显著减小磁盘占用。
            - **性能增强**：开启 `LTO` 全局链接优化。
            - **源码同步**：构建基于官方 `master` 分支最新提交。
            **设备建议**：推荐玩客云 (OneCloud) 或同架构 ARMv7 设备使用。
            ${{ steps.get_version.outputs.IS_BETA == 'true' && '⚠️ 本版本为每日预览版，基于最新代码。' || '✅ 本版本为同步官方发布的正式稳定版。' }}
            - **源码版本**: `${{ steps.get_version.outputs.VERSION }}`
            - **Commit**: `${{ steps.check_changes.outputs.COMMIT_ID }}`
            - **构建时间**: $(date +'%Y-%m-%d %H:%M:%S')

  # --- 轨道 2：编译 Master 预览版 ---
  build_nightly:
    name: Build Master Nightly
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Master
        uses: actions/checkout@v4
        with:
          repository: zeroclaw-labs/zeroclaw
          ref: master
          fetch-depth: 1

      - name: Extract Info
        id: info
        run: |
          VER=$(grep "^version =" Cargo.toml | head -1 | cut -d '"' -f 2)
          COMMIT=$(git rev-parse --short HEAD)
          # 增加日期避免 Tag 重复报错
          DATE=$(date +'%Y%m%d')
          echo "TAG=v${VER}-beta.${DATE}" >> $GITHUB_OUTPUT
          echo "COMMIT=$COMMIT" >> $GITHUB_OUTPUT

      - name: Build and Release Nightly
        run: |
          sed -i '/\[profile.release\]/,$d' Cargo.toml
          echo '[profile.release]' >> Cargo.toml
          echo 'opt-level = "z"' >> Cargo.toml
          echo 'lto = true' >> Cargo.toml
          echo 'codegen-units = 1' >> Cargo.toml
          echo 'strip = true' >> Cargo.toml
          echo 'panic = "abort"' >> Cargo.toml
          rustup target add armv7-unknown-linux-gnueabihf
          cargo install cross --git https://github.com/cross-rs/cross.git
          cross build --target armv7-unknown-linux-gnueabihf --release

          cd target/armv7-unknown-linux-gnueabihf/release
          FILENAME="zeroclaw-${{ steps.info.outputs.TAG }}-armv7-nightly.tar.gz"
          tar -czvf $FILENAME zeroclaw
          mv $FILENAME ../../../
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.TAG }}
          name: "预览测试版 ${{ steps.info.outputs.TAG }}"
          prerelease: true
          files: ${{ env.FILENAME }}
          body: |
            ### 🚀 ZeroClaw ARMv7 自动构建 (体积优化版)
            本版本由 GitHub Actions 每日自动构建，同步官方最新源码。
            **优化特性：**
            - **体积压缩**：开启 `opt-level: z` 和 `strip`，显著减小磁盘占用。
            - **性能增强**：开启 `LTO` 全局链接优化。
            - **源码同步**：构建基于官方 `master` 分支最新提交。
            **设备建议**：推荐玩客云 (OneCloud) 或同架构 ARMv7 设备使用。
            ${{ steps.get_version.outputs.IS_BETA == 'true' && '⚠️ 本版本为每日预览版，基于最新代码。' || '✅ 本版本为同步官方发布的正式稳定版。' }}
            - **源码版本**: `${{ steps.get_version.outputs.VERSION }}`
            - **Commit**: `${{ steps.check_changes.outputs.COMMIT_ID }}`
            - **构建时间**: $(date +'%Y-%m-%d %H:%M:%S')
