name: Scheduled Build ZeroClaw (ARMv7)

on:
  schedule:
    # 每天北京时间 12:00 (UTC 04:00) 运行
    - cron: '0 4 * * *'
  workflow_dispatch: # 保留手动触发按钮

jobs:
  check_and_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Upstream Master
        uses: actions/checkout@v4
        with:
          repository: zeroclaw-labs/zeroclaw
          ref: master

      - name: Extract Version from Cargo.toml
        id: get_version
        run: |
          # 提取 Cargo.toml 中的 version 字段
          VERSION=$(grep "^version =" Cargo.toml | head -1 | cut -d '"' -f 2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "检测到版本号: $VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-unknown-linux-gnueabihf

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross.git

      - name: Build with cross
        run: |
          cross build --target armv7-unknown-linux-gnueabihf --release

      - name: Package Binary
        run: |
          cd target/armv7-unknown-linux-gnueabihf/release
          # 使用提取到的版本号命名
          FILENAME="zeroclaw-${{ steps.get_version.outputs.VERSION }}-armv7-unknown-linux-gnueabihf.tar.gz"
          tar -czvf $FILENAME zeroclaw
          mv $FILENAME ../../../
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FILENAME }}
          path: ${{ env.FILENAME }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 使用版本号作为标签
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          files: ${{ env.FILENAME }}
          body: "自动构建于 $(date +'%Y-%m-%d %H:%M:%S')，基于官方 master 分支最新代码。"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
